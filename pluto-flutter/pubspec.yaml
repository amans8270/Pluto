name: pluto
description: "Pluto — Multi-mode social platform: Dating, TravelBuddy & BFF"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.3
  firebase_messaging: ^15.0.4

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.1

  # WebSocket / Realtime
  web_socket_channel: ^3.0.0

  # UI & Animations
  flutter_card_swiper: ^7.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  smooth_page_indicator: ^1.2.0
  pinput: ^5.0.0

  # Map
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.4.0
  equatable: ^2.0.5
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  flutter_svg: ^2.0.10+1

  # Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  retrofit_generator: ^8.1.0
  json_serializable: ^6.8.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
