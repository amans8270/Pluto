<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluto - Client-Side Image Compression Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8e8ff;
        }
        .upload-area.has-image {
            padding: 0;
            border-style: solid;
        }
        .upload-icon {
            font-size: 48px;
            color: #999;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
            margin-top: 8px;
        }
        #preview {
            width: 100%;
            height: 300px;
            object-fit: contain;
            display: none;
            background: #000;
        }
        .progress-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .progress-overlay.active { display: flex; }
        .progress-bar {
            width: 80%;
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #667eea;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 25px;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-label {
            font-size: 11px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
        }
        .stat-value.green { color: #22c55e; }
        .stat-value.blue { color: #3b82f6; }
        .actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover { background: #e0e0e0; }
        .hidden { display: none !important; }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #d1fae5;
            border-radius: 10px;
            text-align: center;
            color: #065f46;
            font-weight: 500;
            display: none;
        }
        .result.show { display: block; }
        .result a { color: #047857; word-break: break-all; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pluto Photo Upload</h1>
        <p class="subtitle">Client-side compression - instant preview, optimized upload</p>

        <div class="upload-area" id="uploadArea">
            <input type="file" id="fileInput" accept="image/*" hidden>
            
            <div id="uploadPlaceholder">
                <div class="upload-icon">📷</div>
                <div class="upload-text">Click or drag to upload photo</div>
                <div class="upload-hint">JPEG, PNG, WebP • Max 10MB</div>
            </div>

            <img id="preview" alt="Preview">

            <div class="progress-overlay" id="progressOverlay">
                <div id="progressText">Compressing...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="progressPercent">0%</div>
            </div>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-box">
                <div class="stat-label">Original</div>
                <div class="stat-value" id="originalSize">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Compressed</div>
                <div class="stat-value green" id="compressedSize">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Saved</div>
                <div class="stat-value blue" id="savedPercent">-</div>
            </div>
        </div>

        <div class="actions">
            <button class="btn btn-secondary" id="resetBtn" onclick="reset()">Reset</button>
            <button class="btn btn-primary" id="uploadBtn" onclick="upload()" disabled>
                Compress & Upload
            </button>
        </div>

        <div class="result" id="result"></div>
    </div>

    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Configuration - Replace with your Supabase credentials
        const SUPABASE_URL = 'https://esedlxfmzwndjhqboknl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzZWRseGZtenduZGpocWJva25sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4OTkzNjgsImV4cCI6MjA5MDQ3NTM2OH0.DofVsBGyln0Olxjr8ZvsYV7kWU6OjlwTPVKTHqp4nX4';
        
        // Initialize Supabase client
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let selectedFile = null;
        let compressedBlob = null;

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const progressOverlay = document.getElementById('progressOverlay');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const stats = document.getElementById('stats');
        const uploadBtn = document.getElementById('uploadBtn');
        const result = document.getElementById('result');

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }

            selectedFile = file;
            
            // Show preview immediately
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.style.display = 'block';
                uploadPlaceholder.classList.add('hidden');
                uploadArea.classList.add('has-image');
                uploadBtn.disabled = false;
                
                // Start compression
                compressImage(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        async function compressImage(dataUrl) {
            showProgress(true);
            updateProgress(10, 'Loading image...');

            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    updateProgress(30, 'Resizing...');

                    // Calculate new dimensions (max 1200px)
                    let width = img.width;
                    let height = img.height;
                    const maxSize = 1200;

                    if (width > maxSize || height > maxSize) {
                        if (width > height) {
                            height = Math.round((height * maxSize) / width);
                            width = maxSize;
                        } else {
                            width = Math.round((width * maxSize) / height);
                            height = maxSize;
                        }
                    }

                    updateProgress(50, 'Compressing to WebP...');

                    // Create canvas and resize
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    // Enable image smoothing for better quality
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, width, height);

                    updateProgress(70, 'Encoding...');

                    // Convert to WebP
                    canvas.toBlob(
                        (blob) => {
                            compressedBlob = blob;
                            
                            // Update stats
                            const originalSize = selectedFile.size;
                            const compressedSize = blob.size;
                            const saved = ((1 - compressedSize / originalSize) * 100).toFixed(1);

                            document.getElementById('originalSize').textContent = formatSize(originalSize);
                            document.getElementById('compressedSize').textContent = formatSize(compressedSize);
                            document.getElementById('savedPercent').textContent = saved + '%';

                            updateProgress(100, 'Ready!');
                            
                            setTimeout(() => {
                                showProgress(false);
                                stats.style.display = 'grid';
                            }, 500);

                            resolve();
                        },
                        'image/webp',
                        0.85 // 85% quality
                    );
                };
                img.src = dataUrl;
            });
        }

        async function upload() {
            if (!compressedBlob) {
                alert('No image to upload');
                return;
            }

            uploadBtn.disabled = true;
            showProgress(true);
            updateProgress(10, 'Uploading to Supabase...');

            try {
                // Generate unique filename
                const timestamp = Date.now();
                const randomId = Math.random().toString(36).substring(2, 10);
                const userId = 'demo-user-' + Math.random().toString(36).substring(2, 6);
                const filePath = `${userId}/photos/${timestamp}_${randomId}.webp`;

                updateProgress(30, 'Uploading...');

                // Upload to Supabase Storage
                const { data, error } = await supabase.storage
                    .from('photos')
                    .upload(filePath, compressedBlob, {
                        contentType: 'image/webp',
                        upsert: false
                    });

                if (error) throw error;

                updateProgress(80, 'Getting URL...');

                // Get public URL
                const { data: urlData } = supabase.storage
                    .from('photos')
                    .getPublicUrl(filePath);

                const publicUrl = urlData.publicUrl;

                updateProgress(100, 'Done!');

                // Show success
                result.innerHTML = `
                    <strong>Upload successful!</strong><br>
                    <a href="${publicUrl}" target="_blank">${publicUrl}</a>
                `;
                result.classList.add('show');

                setTimeout(() => showProgress(false), 500);

            } catch (error) {
                console.error('Upload error:', error);
                result.innerHTML = `<strong>Error:</strong> ${error.message}`;
                result.style.background = '#fee2e2';
                result.style.color = '#991b1b';
                result.classList.add('show');
                showProgress(false);
            }

            uploadBtn.disabled = false;
        }

        function reset() {
            selectedFile = null;
            compressedBlob = null;
            fileInput.value = '';
            preview.style.display = 'none';
            preview.src = '';
            uploadPlaceholder.classList.remove('hidden');
            uploadArea.classList.remove('has-image');
            stats.style.display = 'none';
            uploadBtn.disabled = true;
            result.classList.remove('show');
            result.style.background = '#d1fae5';
            result.style.color = '#065f46';
        }

        function showProgress(show) {
            progressOverlay.classList.toggle('active', show);
        }

        function updateProgress(percent, text) {
            progressFill.style.width = percent + '%';
            progressText.textContent = text;
            progressPercent.textContent = percent + '%';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }
    </script>
</body>
</html>
