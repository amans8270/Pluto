version: "3.9"

services:
  api:
    build: .
    container_name: pluto-api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+asyncpg://postgres:Amansingh@01@db.esedlxfmzwndjhqboknl.supabase.co:5432/postgres
    env_file:
      - .env
    volumes:
      - ./app:/app/app  # hot-reload in dev
      - ./static/uploads:/app/static/uploads # persist local uploads
      - ./scripts:/app/scripts # for testing
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload

  # Local DB removed - now using Supabase hosted database
